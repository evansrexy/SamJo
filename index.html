<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam & Joanna Wedding</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>

<!-- 🎵 Background Music -->
<audio id="bg-music" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 💎 ENTER SCREEN -->
<div id="intro-screen">
    <div class="intro-content">
        <div class="cross">
    <img src="cross.png" alt="Christian Cross">
</div>
        <h1>Sam ♡ Joanna</h1>
        <p>Are Getting Married</p>
        <button id="enter-btn">Join Us</button>
    </div>
</div>

<!-- 🌸 MAIN WEBSITE -->
<div id="main-content">

<section class="hero fade-in">
    <h1>Sam <span>♡</span> Joanna</h1>
    <p>September 26th | Trichy</p>
</section>

<section class="invitation fade-in">
    <div class="card">
        <h2>We Invite You</h2>
        <p>Join us to celebrate our holy matrimony.</p>

        <!-- 📍 LOCATION SECTION -->
        <div class="location-section">
            <h3>Wedding Location</h3>
            <p>Trichy, Tamil Nadu</p>

            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.google.com/maps/place/Trichy,+Tamil+Nadu" 
                     alt="Trichy Location QR Code">
            </div>

            <p class="scan-text">Scan to View Location on Google Maps</p>
        </div>

    </div>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
